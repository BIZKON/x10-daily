name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel в работе runs для того же PR при новых push'ах — экономия CI-минут.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10.33.4"
  NODE_VERSION: "22"

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run typecheck (turbo + scripts/seed.ts)
        run: pnpm typecheck

  lint:
    name: Lint (biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run biome ci (read-only check)
        run: pnpm exec biome ci .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # apps/api исключён из-за регрессии @cloudflare/vitest-pool-workers@0.16.9
      # с vitest@4.1.7 (см. handoff session 10). Восстановить когда пул обновят.
      - name: Run tests (workers/pipeline + agents)
        run: pnpm turbo run test --filter='!@x10/api'

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build all apps (miniapp, admin, api dry-run, pipeline dry-run)
        run: pnpm build
        env:
          # Next.js production build падает на ESLint/TS warnings — но typecheck
          # уже отдельная job, так что disable повторов через build.
          NEXT_TELEMETRY_DISABLED: "1"

  audit:
    name: Audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # SECURITY-AUDIT.md LOW-10: required gate перед merge. Уровень `high` —
      # PR не блокируется на noise (moderate transitive deps), но critical/high
      # фиксятся через pnpm overrides сразу. Weekly cron в security.yml — moderate+.
      - name: pnpm audit --audit-level=high
        run: pnpm audit --prod --audit-level=high
