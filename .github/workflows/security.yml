name: Security

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    # Каждый понедельник 09:00 UTC = 12:00 МСК. Broader audit для weekly review.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  PNPM_VERSION: "10.33.4"
  NODE_VERSION: "22"

jobs:
  dependency-review:
    name: Dependency Review (PR)
    # Требует включённого Dependency graph в Settings репо (GitHub Advanced
    # Security). На аккаунте под trade-controls фича недоступна → гейтим job
    # repo-переменной: пока DEPENDENCY_REVIEW_ENABLED != 'true' — job скипается
    # (neutral, PR не блокирует). Включат фичу → выставить var в 'true'.
    if: ${{ github.event_name == 'pull_request' && vars.DEPENDENCY_REVIEW_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Блокирует PR при добавлении deps с known high/critical vulnerabilities.
      # https://github.com/actions/dependency-review-action
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  audit-strict:
    name: pnpm audit (moderate+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Stricter чем ci.yml audit job (high) — для weekly review даём прозрачность
      # по moderate transitive deps. В cron-режиме сообщает; на PR — гейт.
      - name: pnpm audit --audit-level=moderate
        run: pnpm audit --prod --audit-level=moderate
