# X10 Daily — Edge API на Cloudflare Workers (Hono v4)
# См. CLAUDE.md §2 — Hyperdrive cache на Neon Frankfurt
name = "x10-api"
main = "src/index.ts"
compatibility_date = "2026-01-15"
compatibility_flags = ["nodejs_compat"]

# Observability — wrangler tail + Logpush integration
[observability]
enabled = true

# Hyperdrive — кэш для Neon (cold start 300-500 мс → <5 мс на хит)
# ID получается через `wrangler hyperdrive create` после привязки Neon URL.
# [[hyperdrive]]
# binding = "HYPERDRIVE"
# id = "REPLACE_AFTER_HYPERDRIVE_CREATE"

# R2 — bucket для аватаров (authors.avatarUrl) и обложек (events/articles coverImageUrl).
# Setup:
#   1. wrangler r2 bucket create x10-images
#   2. wrangler r2 bucket create x10-images-preview     # для local dev
#   3. (опц.) wrangler r2 bucket domain add x10-images images.x10daily.com
#      Тогда X10_IMAGES_PUBLIC_BASE = "https://images.x10daily.com"
#      Без custom domain — используем R2 .dev URL.
# [[r2_buckets]]
# binding = "X10_IMAGES"
# bucket_name = "x10-images"
# preview_bucket_name = "x10-images-preview"

# HIGH-3 — Rate limiting (CF Workers Rate Limiting binding, GA с 2024, free-tier).
# Защищает engagement endpoints (reactions/bookmarks/progress) и pipeline.run
# от спама / abuse через подделанный X-User-Id. Limit per (userId+IP) ключ.
#
# Namespace ID — любое уникальное число (per-account). Counts persist across isolates.
[[unsafe.bindings]]
name = "ENGAGEMENT_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 30, period = 60 }   # 30 запросов / 60 сек per ключ — для reactions/bookmark/progress

[[unsafe.bindings]]
name = "PIPELINE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 10, period = 60 }   # 10 запусков / 60 сек — pipeline.run дорогой (Anthropic $$)

# Secrets ставятся через `wrangler secret put`:
#   DATABASE_URL, ANTHROPIC_API_KEY, ANTHROPIC_ZDR_CONFIRMED,
#   MASKER_BASE_URL, MASKER_API_KEY, INNGEST_EVENT_KEY,
#   X10_ALLOWED_ORIGINS  (CORS allowlist, HIGH-1)
[vars]
NODE_ENV = "production"
NEXT_PUBLIC_POSTHOG_HOST = "https://eu.posthog.com"
# X10_IMAGES_PUBLIC_BASE = "https://images.x10daily.com"

[env.staging]
name = "x10-api-staging"
[env.staging.vars]
NODE_ENV = "staging"
