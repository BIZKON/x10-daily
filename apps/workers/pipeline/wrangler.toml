# X10 Daily — Pipeline worker (Inngest functions)
# См. CLAUDE.md §4 — AI-агенты Draft → (Numbers ∥ ToV) → persist
name = "x10-worker-pipeline"
main = "src/index.ts"
compatibility_date = "2026-01-15"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Secrets (`wrangler secret put`):
