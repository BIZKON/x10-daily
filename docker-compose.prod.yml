# Prod docker-compose для x10-daily M0 на Timeweb Cloud Server (одна VM).
#
# Запуск:
#   ./deploy.sh
# или вручную:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Что отсутствует относительно docker-compose.yml (dev):
#  - postgres: managed PostgreSQL Timeweb (DBaaS, Москва), подключение через
#    приватную сеть. DATABASE_URL задаётся в .env.production.
#
# Что есть только в prod:
#  - caddy: reverse-proxy + auto-TLS Let's Encrypt для 3 сабдоменов.
#  - inngest в prod-режиме (без --dev), персист состояния в managed PG
#    (отдельная схема inngest). Без этого in-flight events теряются при
#    restart'е контейнера.

services:
  # ===== Cache + rate limit =====
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ===== Inngest self-host (prod, без --dev) =====
  # Persist через managed PostgreSQL (Timeweb DBaaS), отдельная схема "inngest"
  # в той же БД что и приложение. Inngest принимает Postgres URI через env
  # INNGEST_POSTGRES_URI / либо CLI --postgres-uri (см. docs.inngest.com).
  # Точное имя флага может отличаться между minor релизами — при
  # несовместимости проверить `docker run inngest/inngest --help`.
  inngest:
    image: inngest/inngest:latest
    restart: unless-stopped
    # ВАЖНО: `inngest start` читает ТОЛЬКО CLI-флаги, НЕ env-переменные —
    # в `inngest start --help` ни одного [$ENV_VAR]. Прежняя передача через
    # environment молча игнорировалась → fallback на SQLite + in-memory Redis,
    # потеря in-flight events при рестарте. Поэтому всё серверное — флагами.
    # Без INNGEST_DEV — это prod-режим. `-u` — SDK URL для авто-регистрации
    # функций (Inngest сам дёргает /inngest при старте → видны в дашборде).
    command:
      - "inngest"
      - "start"
      - "--postgres-uri"
      - "${INNGEST_POSTGRES_URI}"
      - "--redis-uri"
      - "redis://redis:6379"
      - "--event-key"
      - "${INNGEST_EVENT_KEY}"
      - "--signing-key"
      - "${INNGEST_SIGNING_KEY}"
      - "-u"
      - "http://pipeline:8787/inngest"
    expose:
      - "8288"
    depends_on:
      redis:
        condition: service_healthy

  # ===== Hono API on Node =====
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "redis://redis:6379"
      INNGEST_EVENT_KEY: "${INNGEST_EVENT_KEY}"
      INNGEST_BASE_URL: "http://inngest:8288"
      AI_GATEWAY_BASE_URL: "${AI_GATEWAY_BASE_URL:-https://api.timeweb.ai/v1}"
      AI_GATEWAY_API_KEY: "${AI_GATEWAY_API_KEY}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      X10_JWT_SECRET: "${X10_JWT_SECRET}"
      X10_ALLOWED_ORIGINS: "https://app.${X10_BASE_DOMAIN:-x10.media},https://admin.${X10_BASE_DOMAIN:-x10.media}"
      S3_ENDPOINT: "${S3_ENDPOINT:-}"
      S3_REGION: "${S3_REGION:-ru-1}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      S3_BUCKET: "${S3_BUCKET:-}"
      X10_IMAGES_PUBLIC_BASE: "${X10_IMAGES_PUBLIC_BASE:-}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      NEXT_PUBLIC_POSTHOG_HOST: "${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.posthog.com}"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy

  # ===== Pipeline worker (Inngest functions: ingest-vc-rss cron, draft-article, post-to-tg, ...) =====
  pipeline:
    build:
      context: .
      dockerfile: apps/workers/pipeline/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8787"
      DATABASE_URL: "${DATABASE_URL}"
      INNGEST_EVENT_KEY: "${INNGEST_EVENT_KEY}"
      INNGEST_SIGNING_KEY: "${INNGEST_SIGNING_KEY}"
      # Self-host Inngest: SDK (pipeline) и event-sender (api) должны знать
      # адрес inngest-сервера, иначе SDK по умолчанию шлёт в Inngest Cloud и
      # функции не регистрируются (GraphQL functions:[]). Это звено sync.
      INNGEST_BASE_URL: "http://inngest:8288"
      AI_GATEWAY_BASE_URL: "${AI_GATEWAY_BASE_URL:-https://api.timeweb.ai/v1}"
      AI_GATEWAY_API_KEY: "${AI_GATEWAY_API_KEY}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TG_TEST_CHANNEL_ID: "${TG_TEST_CHANNEL_ID:-}"
      # Escape-hatch прокси для api.telegram.org (audit M2). Пуст → IPv6/NAT66.
      TELEGRAM_PROXY_URL: "${TELEGRAM_PROXY_URL:-}"
      # $-мониторинг (session 20): чат ops-алертов + дневной потолок/warn.
      # Дефолты дублируют схему @x10/config (15/9) — настраиваются из .env без
      # правки кода. TG_OPS_CHAT_ID пуст → алерты в логи.
      TG_OPS_CHAT_ID: "${TG_OPS_CHAT_ID:-}"
      DAILY_BUDGET_USD: "${DAILY_BUDGET_USD:-15}"
      DAILY_BUDGET_WARN_USD: "${DAILY_BUDGET_WARN_USD:-9}"
      # VK posting (session 21): оба пусты → VK-ветка отключена (draft-article не
      # генерит VK-вариант, post-to-vk скипает). Задать в .env → активируется.
      VK_ACCESS_TOKEN: "${VK_ACCESS_TOKEN:-}"
      VK_OWNER_ID: "${VK_OWNER_ID:-}"
      # loadEnv (общий для api+pipeline) требует X10_JWT_SECRET в productionRequired.
      # Pipeline сессии не выпускает, но env-валидатор общий → ключ обязателен.
      X10_JWT_SECRET: "${X10_JWT_SECRET}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
    expose:
      - "8787"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      inngest:
        condition: service_started

  # ===== Admin Next.js (editorial UI) =====
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: "${DATABASE_URL}"
      # Серверный base URL до apps/api (RSC/Server Actions/upload). Код читает
      # X10_API_BASE_URL (admin/src/lib/api.ts); внутри сети — по имени сервиса.
      X10_API_BASE_URL: "http://api:8080"
      NEXT_PUBLIC_API_URL: "https://api.${X10_BASE_DOMAIN:-x10.media}"
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: "${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
    expose:
      - "3001"
    depends_on:
      api:
        condition: service_healthy

  # ===== Miniapp Next.js (Telegram Mini App) =====
  miniapp:
    build:
      context: .
      dockerfile: apps/miniapp/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # X10_API_BASE_URL — серверный base URL до apps/api (RSC/Server Actions).
      # КОД ЧИТАЕТ ИМЕННО ЭТО (miniapp/src/lib/api.ts getBaseUrl). Внутри Docker-
      # сети miniapp→api идёт по имени сервиса напрямую, без TLS-хопа через Caddy.
      # NEXT_PUBLIC_API_URL в коде не читается нигде (legacy с Vercel).
      X10_API_BASE_URL: "http://api:8080"
      NEXT_PUBLIC_API_URL: "https://api.${X10_BASE_DOMAIN:-x10.media}"
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: "${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-}"
      NEXT_PUBLIC_POSTHOG_KEY: "${NEXT_PUBLIC_POSTHOG_KEY:-}"
      NEXT_PUBLIC_POSTHOG_HOST: "${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.posthog.com}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

  # ===== Reverse proxy + auto-TLS =====
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      X10_BASE_DOMAIN: "${X10_BASE_DOMAIN:-x10.media}"
      CADDY_ACME_EMAIL: "${CADDY_ACME_EMAIL:-admin@x10.media}"
    depends_on:
      api:
        condition: service_healthy
      admin:
        condition: service_started
      miniapp:
        condition: service_started

volumes:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  # IPv6 включён намеренно: api.telegram.org из этой РФ-сети доступен ТОЛЬКО по
  # IPv6 — IPv4 (149.154.x) молча фильтруется (даже с хоста `curl -4` → timeout).
  # Контейнеру pipeline нужен IPv6, иначе post-to-tg падает с ETIMEDOUT.
  # Docker 29: ip6tables включён по умолчанию → авто-выдаёт ULA-подсеть и делает
  # NAT66 (masquerade в хостовый IPv6). На хосте требуется (см.
  # /etc/sysctl.d/99-x10-ipv6.conf): net.ipv6.conf.all.forwarding=1 +
  # net.ipv6.conf.eth0.accept_ra=2 (иначе forwarding сносит RA-маршрут eth0).
  default:
    enable_ipv6: true
